spring:
  application:
    name: backend-local

api:
  security:
    token:
    secret: ${JWT_SECRET:uma-chave-secreta-e-muito-longa-para-desenvolvimento-local-com-mais-de-32-caracteres}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

datasource:
  url: ${DATABASE_URL:jdbc:h2:mem:testdb}
  username: ${DATABASE_USER:sa}
  password: ${DATABASE_PASSWORD:}
  driver-class-name: ${DATABASE_DRIVER:org.h2.Driver}

